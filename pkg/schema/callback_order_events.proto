syntax = "proto3";

package callbackevents;

option go_package = "github.com/crypto-bundle/bc-wallet-common-callback-api/pkg/proto/callbackevents";

enum OrderType {
  PLACEHOLDER_ORDER_TYPE = 0;
  WITHDRAW = 1;
  DEPOSIT = 2;
}

enum OrderStatus {
  PLACEHOLDER_ORDER_STATUS = 0;
  ACCEPTED = 1;
  CREATED = 2;
  PROCESSING = 3;
  CONFIRMED = 4;
  FAILED = 5;
  SUCCESS = 6;
  CANCELED = 7;
}

enum OperationType {
  OPERATION_TYPE_PLACEHOLDER = 0;
  OPERATION_TYPE_SPENT = 1;
  OPERATION_TYPE_RECEIVE = 2;
  OPERATION_TYPE_FEE = 3;
}

message EstimationFeeIdentify {
  string UUID = 1;
}

message EstimationFeeUnitIdentify {
  string UUID = 1;
}

message OrderIdentity {
  string UUID = 1;
  string ExternalOrderUUID = 2;
  string ProviderOrderUUID = 3;
}

enum BcTxStatus {
  PLACEHOLDER_BC_TX_STATUS = 0;
  BC_TX_IN_MINING = 1;
  BC_TX_SUCCESS = 2;
  BC_TX_EXECUTION_FAILED = 3;
  BC_TX_WAITING_FOR_CONFIRMATIONS = 4;
}

message BcTxIdentity {
  string TxID = 1;
  bytes Meta = 2;
}

message CurrencyIdentity {
  string UUID = 1;
}

message CurrencyInfo {
  CurrencyIdentity Identifier = 1;
  string Symbol = 2;
  uint32 Decimals = 3;
}

message BcTxOperation {
  uint32 Index = 1;
  string Address = 2;
  uint64 Amount = 4;
  CurrencyInfo CurrencyInfo = 5;
}

message OperationsList {
  repeated BcTxOperation Operations = 1;
}

message OwnerWalletInfo {
  string WalletUUID = 1;
  string AccountUUID = 2;
}

message BcTxInfo {
  uint32 NetworkIdentifier = 1;
  BcTxIdentity BcTxIdentifier = 2;
  uint64 Confirmations = 3;
  uint64 BlockNumber = 4;
  map<string, OperationsList> Operations = 5;
  BcTxStatus Status = 6;
  uint64 RealFee = 7;
  string ExplorerURL = 8;
}

message Order {
  OrderIdentity OrderIdentifier = 1;
  OrderType Type = 2;
  OrderStatus Status = 3;
  uint32 NetworkIdentifier = 4;
  uint32 ProviderIdentifier = 5;
  string MerchantIdentifier = 6;
  string AddressIdentifier = 7;
  uint64 Amount = 8;
  uint64 RealFee = 9;
  EstimationFeeUnitIdentify EstimationFeeUnitIdentifier = 10;
  OwnerWalletInfo OwnerWallet = 11;
  CurrencyIdentity CurrencyIdentifier = 12;
  repeated BcTxInfo BcTx = 13;
}

message OrderEvent {
  string EventIdentity = 1;
  uint32 NetworkIdentifier = 2;
  uint32 ProviderIdentifier = 3;
  string MerchantIdentifier = 4;
  string OrderIdentifier = 5;
  string Type = 6;
  string Producer = 7;
  string Message = 8;
  Order OrderInfo = 9;
}